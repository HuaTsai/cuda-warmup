[workspace]
authors = ["HuaTsai <huatsai42@gmail.com>"]
channels = ["conda-forge"]
name = "cuda-warmup"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
install-hooks = "pre-commit install"

# Print the docs/reduce.md Speed-Of-Light columns for saved .ncu-rep reports.
# Trailing args are the report files, e.g. `pixi run ncu-row v0.ncu-rep v1.ncu-rep`.
ncu-row = "bash scripts/ncu-summary.sh"

# Each build type gets its own dir, so `pixi run test` is ALWAYS RelWithDebInfo
# (optimized + -lineinfo for compute-sanitizer / Nsight), and the -debug / -release
# variants coexist in build-debug/ and build-release/ without ever disturbing it or
# forcing a rebuild when you switch. Default (build/):
configure = "cmake -G Ninja -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo"
build = { cmd = "cmake --build build", depends-on = ["configure"] }
test = { cmd = "ctest --test-dir build --output-on-failure", depends-on = ["build"] }

# Debug (build-debug/): -G, cuda-gdb, device optimization off. Never benchmark with this.
configure-debug = "cmake -G Ninja -S . -B build-debug -DCMAKE_BUILD_TYPE=Debug"
build-debug = { cmd = "cmake --build build-debug", depends-on = ["configure-debug"] }
test-debug = { cmd = "ctest --test-dir build-debug --output-on-failure", depends-on = ["build-debug"] }

# Release (build-release/): clean, fastest, no debug metadata — final benchmark numbers.
configure-release = "cmake -G Ninja -S . -B build-release -DCMAKE_BUILD_TYPE=Release"
build-release = { cmd = "cmake --build build-release", depends-on = ["configure-release"] }
test-release = { cmd = "ctest --test-dir build-release --output-on-failure", depends-on = ["build-release"] }

[system-requirements]
cuda = "12"

[dependencies]
cuda-toolkit = ">=12.9.2,<13"
gtest = ">=1.17.0,<2"
cmake = ">=4.2.3,<5"
ninja = ">=1.13.2,<2"
clang-tools = ">=21,<22"
clang = ">=21,<22"
pre-commit = ">=4.6,<5"

